services:
  postgres:
    image: postgres:17-alpine
    container_name: salesops-postgres
    environment:
      POSTGRES_DB: salesops_local
      POSTGRES_USER: salesops_user
      POSTGRES_PASSWORD: salesops_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesops_user -d salesops_local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
